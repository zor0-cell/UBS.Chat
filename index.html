<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UBS Chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --surface2: #1e232c;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --accent: #4f8cff;
      --accent2: #2563eb;
      --text: #e8eaf0;
      --text2: #8b909e;
      --text3: #555a68;
      --bubble-me: #1e3a6e;
      --bubble-other: #1e232c;
      --green: #22c97a;
      --red: #ff5c5c;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Sidebar ── */
    .sidebar-head {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .s-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .5px;
      color: #fff;
      flex-shrink: 0;
    }

    .s-brand {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .s-brand span {
      font-weight: 300;
      color: var(--text2);
      margin-left: 3px;
    }

    .sidebar-section {
      padding: 16px 16px 8px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      color: var(--text3);
      text-transform: uppercase;
    }

    .room {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      margin: 1px 8px;
      transition: background .15s;
      position: relative;
    }

    .room:hover {
      background: var(--surface2);
    }

    .room.active {
      background: rgba(79, 140, 255, .12);
    }

    .room.active .room-name {
      color: var(--accent);
    }

    .room-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .room-name {
      font-size: 13px;
      font-weight: 400;
      color: var(--text2);
    }

    .room.active .room-name {
      font-weight: 500;
    }

    .room-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 20px;
      padding: 2px 7px;
      font-family: 'DM Mono', monospace;
    }

    .sidebar-foot {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .my-card {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .my-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .my-alias {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .my-tag {
      font-size: 11px;
      color: var(--text3);
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(34, 201, 122, .5);
    }

    /* ── Chat header ── */
    .chat-header {
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .ch-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .ch-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ch-sub {
      font-size: 12px;
      color: var(--text3);
    }

    .ch-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-pill {
      background: rgba(34, 201, 122, .1);
      border: 1px solid rgba(34, 201, 122, .25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--green);
      font-family: 'DM Mono', monospace;
    }

    .anon-pill {
      background: rgba(79, 140, 255, .1);
      border: 1px solid rgba(79, 140, 255, .25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--accent);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .sys-line {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      padding: 4px 0;
      font-family: 'DM Mono', monospace;
    }

    .msg-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 70%;
      animation: fadeUp .2s ease;
    }

    .msg-wrap.me {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-wrap.other {
      align-self: flex-start;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg-wrap.me .msg-body {
      align-items: flex-end;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text3);
      padding: 0 6px;
      font-family: 'DM Mono', monospace;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg-wrap.other .bubble {
      background: var(--bubble-other);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg-wrap.me .bubble {
      background: var(--bubble-me);
      border: 1px solid rgba(79, 140, 255, .2);
      border-bottom-right-radius: 4px;
      color: #c8d8ff;
    }

    .report-btn {
      font-size: 10px;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      font-family: 'DM Sans', sans-serif;
      opacity: 0;
      transition: opacity .15s;
    }

    .msg-wrap:hover .report-btn {
      opacity: 1;
    }

    .report-btn:hover {
      color: var(--red);
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 22px;
      padding: 10px 18px;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s;
    }

    .input-bar input:focus {
      border-color: rgba(79, 140, 255, .5);
    }

    .input-bar input::placeholder {
      color: var(--text3);
    }

    .char-count {
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      min-width: 38px;
      text-align: right;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent2);
    }

    .send-btn:active {
      transform: scale(.93);
    }

    .send-btn svg {
      width: 17px;
      height: 17px;
      fill: #fff;
    }

    /* ── Auth overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 15, 18, .97);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .auth-logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .5px;
      color: #fff;
    }

    .auth-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .auth-desc {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      line-height: 1.6;
    }

    .auth-field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .auth-field label {
      font-size: 12px;
      color: var(--text2);
      letter-spacing: .3px;
    }

    .auth-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 11px 16px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      font-family: 'DM Mono', monospace;
      transition: border-color .15s;
    }

    .auth-field input:focus {
      border-color: rgba(79, 140, 255, .5);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, .08);
    }

    .auth-error {
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
      font-family: 'DM Mono', monospace;
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: .2px;
    }

    .auth-btn:hover {
      background: var(--accent2);
    }

    .auth-btn:active {
      transform: scale(.98);
    }

    .auth-footer {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      line-height: 1.6;
    }

    .auth-footer svg {
      vertical-align: middle;
      margin-right: 4px;
      opacity: .5;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all .3s;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Mobile ── */
    @media(max-width:640px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Auth overlay -->
  <div class="overlay" id="overlay">
    <div class="auth-box">
      <div class="auth-logo">UBS</div>
      <div>
        <div class="auth-title">Студенческий чат</div>
        <div class="auth-desc" style="margin-top:8px;">Анонимный. Только для студентов UBS.<br>Ваше имя никогда не будет
          раскрыто.</div>
      </div>
      <div class="auth-field">
        <label>Университетская почта</label>
        <input type="email" id="email-inp" placeholder="yourname@ubs.edu.uz" autocomplete="off" spellcheck="false" />
        <div class="auth-error" id="auth-err"></div>
      </div>
      <button class="auth-btn" id="auth-btn">Войти анонимно →</button>
      <div class="auth-footer">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M8 1a3 3 0 00-3 3v2H4a1 1 0 00-1 1v7a1 1 0 001 1h8a1 1 0 001-1V7a1 1 0 00-1-1h-1V4a3 3 0 00-3-3zm-1 3a1 1 0 012 0v2H7V4zm1 6a1 1 0 110-2 1 1 0 010 2z" />
        </svg>
        Почта используется только для верификации. Сообщения полностью анонимны.
      </div>
    </div>
  </div>

  <!-- App layout -->
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="s-logo">UBS</div>
        <div class="s-brand">Students <span>Chat</span></div>
      </div>
      <div class="sidebar-section">Комнаты</div>
      <div id="room-list"></div>
      <div class="sidebar-foot">
        <div class="my-card">
          <div class="my-avatar" id="s-avatar"></div>
          <div>
            <div class="my-alias" id="s-alias">—</div>
            <div class="my-tag">Анонимный</div>
          </div>
          <div class="online-dot"></div>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="chat-header">
        <div class="ch-icon" id="ch-icon"></div>
        <div>
          <div class="ch-name" id="ch-name">Общее</div>
          <div class="ch-sub" id="ch-sub">Все студенты UBS</div>
        </div>
        <div class="ch-right">
          <div class="online-pill" id="online-pill">● 0 онлайн</div>
          <div class="anon-pill">🔒 анонимно</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <input type="text" id="msg-inp" placeholder="Написать анонимно…" maxlength="400" autocomplete="off" />
        <span class="char-count" id="char-c">400</span>
        <button class="send-btn" id="send-btn">
          <svg viewBox="0 0 20 20">
            <path d="M2.5 10L17.5 2.5l-3.75 7.5 3.75 7.5L2.5 10z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const DOMAIN = "ubs.edu.uz";
    const STORAGE_KEY = "ubs_chat_v2";
    const MAX_MSG = 200;

    const ROOMS = [
      { id: "general", name: "Общее", icon: "💬", desc: "Все студенты UBS", color: "#4f8cff" },
      { id: "study", name: "Учёба", icon: "📚", desc: "Пары, сдача, вопросы", color: "#22c97a" },
      { id: "session", name: "Сессия", icon: "📝", desc: "Экзамены, зачёты", color: "#f59e0b" },
      { id: "jobs", name: "Работа / стажировки", icon: "💼", desc: "Вакансии, советы", color: "#a78bfa" },
      { id: "housing", name: "Жильё", icon: "🏠", desc: "Общежития, аренда", color: "#fb923c" },
      { id: "events", name: "Мероприятия", icon: "🎉", desc: "События кампуса", color: "#34d399" },
    ];

    const AVATAR_COLORS = [
      { bg: "rgba(79,140,255,.18)", text: "#7ab3ff" },
      { bg: "rgba(34,201,122,.18)", text: "#4edca0" },
      { bg: "rgba(245,158,11,.18)", text: "#fbbf24" },
      { bg: "rgba(167,139,250,.18)", text: "#c4b5fd" },
      { bg: "rgba(251,146,60,.18)", text: "#fca369" },
      { bg: "rgba(52,211,153,.18)", text: "#6ee7b7" },
    ];

    const SEEDS = {
      general: [
        { a: "Аноним #14", t: "Кто знает, когда будет открытый день для абитуриентов?" },
        { a: "Аноним #27", t: "Вроде в конце октября. Видел объявление на доске." },
        { a: "Аноним #8", t: "Библиотека до скольки работает в пятницу?" },
        { a: "Аноним #52", t: "До 18:00, потом только читальный зал до 20:00." },
      ],
      study: [
        { a: "Аноним #33", t: "Кто сдавал макроэкономику у Юсупова? Насколько строго на экзамене?" },
        { a: "Аноним #11", t: "Не слишком. Главное знать базовые формулы и термины." },
        { a: "Аноним #47", t: "У него тест на 50 вопросов + 2 эссе. Эссе самое важное." },
      ],
      session: [
        { a: "Аноним #9", t: "До когда подавать на пересдачу?" },
        { a: "Аноним #61", t: "До 15 числа. Заявление в деканат 3 корпуса." },
      ],
      jobs: [
        { a: "Аноним #38", t: "Есть кто работает в Kapitalbank? Как там условия?" },
        { a: "Аноним #22", t: "Работал стажёром летом. Нормально, платят около 1.5 млн за стаж." },
      ],
      housing: [
        { a: "Аноним #7", t: "Общежитие №2 стоит брать? Далеко от кампуса?" },
        { a: "Аноним #44", t: "15 минут пешком. Комнаты нормальные, но Wi-Fi слабый." },
      ],
      events: [
        { a: "Аноним #19", t: "В пятницу карьерная ярмарка в главном корпусе — кто идёт?" },
        { a: "Аноним #55", t: "Да, там будет Uzum, Hamkorbank и ещё пара компаний." },
      ],
    };

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function saveData(d) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch { }
    }

    let state = loadData();
    if (!state.rooms) {
      state.rooms = {};
      ROOMS.forEach(r => {
        const seed = SEEDS[r.id] || [];
        const base = seed.map((s, i) => ({
          id: Date.now() - (seed.length - i) * 60000,
          alias: s.a,
          text: s.t,
          time: fmtTime(new Date(Date.now() - (seed.length - i) * 60000)),
          reported: false,
        }));
        state.rooms[r.id] = base;
      });
    }
    if (!state.online) state.online = {};
    saveData(state);

    let myAlias = "";
    let myColorIdx = 0;
    let activeRoom = "general";

    function fmtTime(d) {
      return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
    }
    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function getColor(alias) {
      const n = parseInt(alias.replace(/\D/g, "")) || 0;
      return AVATAR_COLORS[n % AVATAR_COLORS.length];
    }
    function initials(alias) {
      const n = alias.split("#")[1] || "?";
      return "A" + n.charAt(0);
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    function buildSidebar() {
      const list = document.getElementById("room-list");
      list.innerHTML = "";
      ROOMS.forEach(r => {
        const msgs = state.rooms[r.id] || [];
        const div = document.createElement("div");
        div.className = "room" + (r.id === activeRoom ? " active" : "");
        div.dataset.id = r.id;
        const count = msgs.length > 0 ? `<span class="room-badge">${Math.min(msgs.length, 99)}</span>` : "";
        div.innerHTML = `
      <div class="room-icon" style="background:${r.color}22;">${r.icon}</div>
      <span class="room-name">${r.name}</span>
      ${count}
    `;
        div.addEventListener("click", () => switchRoom(r.id));
        list.appendChild(div);
      });
    }

    function switchRoom(id) {
      activeRoom = id;
      const r = ROOMS.find(x => x.id === id);
      document.getElementById("ch-icon").textContent = r.icon;
      document.getElementById("ch-name").textContent = r.name;
      document.getElementById("ch-sub").textContent = r.desc;
      buildSidebar();
      renderMessages();
    }

    function renderMessages() {
      const container = document.getElementById("messages");
      const msgs = state.rooms[activeRoom] || [];
      container.innerHTML = "";
      const sys = document.createElement("div");
      sys.className = "sys-line";
      sys.textContent = "— начало истории комнаты —";
      container.appendChild(sys);
      msgs.forEach(m => appendMsgEl(m, false));
      container.scrollTop = container.scrollHeight;
    }

    function appendMsgEl(m, animate) {
      if (m.reported) return;
      const container = document.getElementById("messages");
      const isMe = m.alias === myAlias;
      const col = getColor(m.alias);

      const wrap = document.createElement("div");
      wrap.className = "msg-wrap " + (isMe ? "me" : "other");
      if (!animate) wrap.style.animation = "none";

      const av = document.createElement("div");
      av.className = "msg-av";
      av.style.background = col.bg;
      av.style.color = col.text;
      av.textContent = initials(m.alias);

      const body = document.createElement("div");
      body.className = "msg-body";

      const meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.textContent = (isMe ? "Вы" : m.alias) + " · " + m.time;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = m.text;

      const rBtn = document.createElement("button");
      rBtn.className = "report-btn";
      rBtn.textContent = "⚑ пожаловаться";
      rBtn.addEventListener("click", () => {
        m.reported = true;
        saveData(state);
        wrap.remove();
        showToast("Жалоба отправлена. Сообщение скрыто.");
      });

      body.appendChild(meta);
      body.appendChild(bubble);
      if (!isMe) body.appendChild(rBtn);

      wrap.appendChild(av);
      wrap.appendChild(body);
      container.appendChild(wrap);
      if (animate) container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const inp = document.getElementById("msg-inp");
      const text = inp.value.trim();
      if (!text || !myAlias) return;
      inp.value = "";
      updateChar(400);
      const msg = {
        id: Date.now(),
        alias: myAlias,
        text,
        time: fmtTime(new Date()),
        reported: false,
      };
      if (!state.rooms[activeRoom]) state.rooms[activeRoom] = [];
      state.rooms[activeRoom].push(msg);
      if (state.rooms[activeRoom].length > MAX_MSG) {
        state.rooms[activeRoom] = state.rooms[activeRoom].slice(-MAX_MSG);
      }
      saveData(state);
      appendMsgEl(msg, true);
      buildSidebar();
    }

    function updateChar(n) {
      document.getElementById("char-c").textContent = n;
    }

    function updateOnline() {
      const count = randInt(28, 74);
      document.getElementById("online-pill").textContent = "● " + count + " онлайн";
    }

    // Auth
    document.getElementById("auth-btn").addEventListener("click", tryLogin);
    document.getElementById("email-inp").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

    function tryLogin() {
      const val = document.getElementById("email-inp").value.trim().toLowerCase();
      const err = document.getElementById("auth-err");
      if (!val) { err.textContent = "Введите email."; return; }
      if (!val.includes("@")) { err.textContent = "Неверный формат email."; return; }
      const domain = val.split("@")[1];
      if (domain !== DOMAIN) { err.textContent = "Доступ только с почты @" + DOMAIN; return; }
      err.textContent = "";
      const num = randInt(10, 99);
      myAlias = "Аноним #" + num;
      myColorIdx = num % AVATAR_COLORS.length;
      const col = AVATAR_COLORS[myColorIdx];
      document.getElementById("s-alias").textContent = myAlias;
      const av = document.getElementById("s-avatar");
      av.style.background = col.bg;
      av.style.color = col.text;
      av.textContent = "A" + num.toString().charAt(0);
      document.getElementById("overlay").style.display = "none";
      buildSidebar();
      switchRoom("general");
      updateOnline();
      setInterval(updateOnline, 30000);
      showToast("Добро пожаловать! Вы — " + myAlias);
    }

    // Input
    document.getElementById("msg-inp").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("msg-inp").addEventListener("input", e => {
      updateChar(400 - e.target.value.length);
    });

    // Placeholder before auth
    document.getElementById("ch-icon").textContent = ROOMS[0].icon;
  </script>
</body>

</html>
